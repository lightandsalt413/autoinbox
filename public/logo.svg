<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Rich Metallic Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE8A3" />
      <stop offset="50%" stop-color="#C5A55A" />
      <stop offset="100%" stop-color="#8A7540" />
    </linearGradient>
    
    <!-- Pristine Metallic White Gradient -->
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F6F0E6" />
    </linearGradient>
    
    <!-- Deep Premium Charcoal Background -->
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E22" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>
    
    <!-- Subtle Gold Drop Shadow Glow -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#C5A55A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Outer squircle leaf-shaped icon container -->
  <path d="M 104,32 
           L 292,32 
           A 188,188 0 0,1 480,220 
           L 480,408 
           A 72,72 0 0,1 408,480 
           L 104,480 
           A 72,72 0 0,1 32,408 
           L 32,104 
           A 72,72 0 0,1 104,32 Z" 
        fill="url(#darkBg)" 
        stroke="url(#goldGrad)" 
        stroke-width="12"
        filter="url(#goldGlow)" />
        
  <!-- Inner Envelope outline (Designed with White and Gold) -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Main envelope outer box (White) -->
    <rect x="116" y="166" width="280" height="180" rx="24" ry="24"
          fill="none" 
          stroke="url(#whiteGrad)" 
          stroke-width="16" />
          
    <!-- Top flap crease (Gold) -->
    <path d="M 122,172 L 256,266 L 390,172" 
          fill="none" 
          stroke="url(#goldGrad)" 
          stroke-width="14" />
          
    <!-- Bottom corner fold creases (White) -->
    <path d="M 122,340 L 216,254" 
          fill="none" 
          stroke="url(#whiteGrad)" 
          stroke-width="12" 
          opacity="0.85" />
          
    <path d="M 390,340 L 296,254" 
          fill="none" 
          stroke="url(#whiteGrad)" 
          stroke-width="12" 
          opacity="0.85" />
  </g>
</svg>
